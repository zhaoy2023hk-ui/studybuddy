<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4a90d9">
<link rel="manifest" href="manifest.json">
<title>StudyBuddy - 學習訓練</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0eb;--card:#fff;--text:#2c3e50;--text-light:#7f8c8d;
  --jessie:#9b59b6;--jessie-light:#f3e8f9;--jessie-dark:#7d3c98;
  --justin:#3498db;--justin-light:#e8f4fd;--justin-dark:#2471a3;
  --correct:#27ae60;--wrong:#e74c3c;--gold:#f39c12;
  --radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:-apple-system,'Segoe UI','PingFang HK','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;-webkit-tap-highlight-color:transparent}
#app{width:100%;max-width:480px;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
/* Screens */
.screen{display:none;flex-direction:column;flex:1;padding:20px 16px;animation:fadeIn .25s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* Header */
.header{text-align:center;padding:16px 0 8px}
.header h1{font-size:22px;font-weight:700}
.header .subtitle{font-size:13px;color:var(--text-light);margin-top:2px}
/* Profile Selection */
.profile-grid{display:flex;gap:16px;justify-content:center;margin-top:32px;flex:1;align-items:center}
.profile-card{flex:1;max-width:180px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 16px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s;border:3px solid transparent}
.profile-card:active{transform:scale(.97)}
.profile-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.12)}
.profile-card.jessie{border-color:var(--jessie)}
.profile-card.justin{border-color:var(--justin)}
.profile-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:36px;font-weight:700;color:#fff}
.profile-card.jessie .profile-avatar{background:linear-gradient(135deg,var(--jessie),var(--jessie-dark))}
.profile-card.justin .profile-avatar{background:linear-gradient(135deg,var(--justin),var(--justin-dark))}
.profile-name{font-size:17px;font-weight:600;margin-bottom:4px}
.profile-grade{font-size:12px;color:var(--text-light)}
/* Dashboard */
.dash-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.dash-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0}
.dash-avatar.jessie{background:var(--jessie)}
.dash-avatar.justin{background:var(--justin)}
.dash-info{flex:1}
.dash-name{font-size:18px;font-weight:600;line-height:1.2}
.dash-grade{font-size:12px;color:var(--text-light)}
.dash-back{font-size:26px;color:var(--text-light);cursor:pointer;padding:8px}
.section-title{font-size:14px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px}
.subject-list{display:flex;flex-direction:column;gap:10px}
.subject-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .12s}
.subject-card:active{transform:scale(.98)}
.subject-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.subject-info{flex:1;min-width:0}
.subject-name{font-size:15px;font-weight:600;margin-bottom:3px}
.subject-desc{font-size:12px;color:var(--text-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subject-score{font-size:13px;font-weight:600;text-align:right}
.subject-score.good{color:var(--correct)}
.subject-score.ok{color:var(--gold)}
.subject-score.poor{color:var(--wrong)}
.progress-bar{height:4px;background:#eee;border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
/* Exercise */
.ex-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ex-title{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.ex-counter{font-size:13px;color:var(--text-light)}
.ex-exit{width:36px;height:36px;border-radius:50%;border:none;background:#f0ebe0;color:var(--text-light);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.ex-exit:active{background:#e0d5c5}
/* Reading passage */
.reading-passage{background:#f8f9fa;border-radius:12px;padding:16px 18px;font-size:17px;line-height:1.7;max-height:40vh;overflow-y:auto;text-align:left;margin-bottom:16px;border-left:4px solid var(--jessie)}
.reading-passage .label{font-size:11px;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.ex-progress{height:5px;background:#e0dcd5;border-radius:3px;margin-bottom:24px;overflow:hidden}
.ex-progress-fill{height:100%;border-radius:3px;transition:width .3s;background:var(--justin)}
.ex-progress-fill.jessie{background:var(--jessie)}
.question-area{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 4px}
.question-prompt{font-size:20px;font-weight:600;line-height:1.5;margin-bottom:24px;max-width:100%}
.question-context{font-size:14px;color:var(--text-light);margin-bottom:8px;line-height:1.6;text-align:left;background:#f8f9fa;border-radius:10px;padding:12px 16px;max-width:100%}
.answer-area{width:100%;max-width:320px}
.answer-input{width:100%;padding:14px 16px;font-size:18px;border:2px solid #ddd;border-radius:12px;text-align:center;outline:none;transition:border-color .2s;-webkit-appearance:none;background:#fff}
.answer-input:focus{border-color:var(--justin)}
.answer-input.jessie:focus{border-color:var(--jessie)}
.option-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:320px}
.option-btn{padding:16px 12px;font-size:16px;border:2px solid #e0dcd5;border-radius:12px;background:var(--card);cursor:pointer;transition:all .15s;text-align:center;font-weight:500}
.option-btn:active{transform:scale(.96)}
.option-btn.selected{border-color:var(--justin);background:#e8f4fd;color:var(--justin-dark)}
.option-btn.selected.jessie{border-color:var(--jessie);background:var(--jessie-light);color:var(--jessie-dark)}
.submit-btn{width:100%;max-width:320px;padding:15px;font-size:17px;font-weight:600;border:none;border-radius:12px;background:var(--justin);color:#fff;cursor:pointer;margin-top:16px;transition:opacity .15s}
.submit-btn:active{opacity:.85}
.submit-btn.jessie{background:var(--jessie)}
.submit-btn:disabled{opacity:.5;pointer-events:none}
.feedback{text-align:center;padding:12px;font-size:15px;font-weight:600;margin-top:12px;min-height:44px;line-height:1.5}
.feedback.correct{color:var(--correct)}
.feedback.wrong{color:var(--wrong)}
/* Results */
.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 20px;text-align:center;margin:20px 0}
.result-emoji{font-size:56px;margin-bottom:12px}
.result-title{font-size:20px;font-weight:700;margin-bottom:6px}
.result-subtitle{font-size:14px;color:var(--text-light);margin-bottom:18px}
.result-stats{display:flex;justify-content:center;gap:24px;margin-bottom:20px}
.result-stat{text-align:center}
.result-stat-value{font-size:28px;font-weight:700}
.result-stat-label{font-size:11px;color:var(--text-light)}
.result-detail{text-align:left;font-size:13px;color:var(--text-light);margin-top:8px;line-height:1.8}
.result-actions{display:flex;flex-direction:column;gap:10px}
.result-btn{padding:14px;font-size:15px;font-weight:600;border:none;border-radius:12px;cursor:pointer;text-align:center;transition:opacity .15s}
.result-btn:active{opacity:.85}
.result-btn.primary{background:var(--justin);color:#fff}
.result-btn.primary.jessie{background:var(--jessie)}
.result-btn.secondary{background:#e8e4dd;color:var(--text)}
/* Empty state */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-light);text-align:center;padding:20px}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;line-height:1.6}
/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2c3e50;color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;z-index:100;animation:toastIn .3s ease;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* Score badge on subject card */
.score-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:3px 8px;border-radius:10px}
.score-badge.good{background:#e8f8f0;color:var(--correct)}
.score-badge.ok{background:#fef5e7;color:var(--gold)}
.score-badge.poor{background:#fdedec;color:var(--wrong)}
.score-badge.new{background:#f0f0f0;color:var(--text-light)}
/* History */
.history-list{display:flex;flex-direction:column;gap:10px}
.history-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;cursor:pointer;transition:transform .12s}
.history-card:active{transform:scale(.98)}
.history-date{font-size:12px;color:var(--text-light);margin-bottom:4px}
.history-subject{font-size:15px;font-weight:600;margin-bottom:6px}
.history-score-row{display:flex;align-items:center;gap:8px}
.history-pct{font-size:18px;font-weight:700}
.history-fraction{font-size:13px;color:var(--text-light)}
.history-detail{font-size:13px;color:var(--text-light);margin-top:8px;line-height:1.8;padding:10px;background:#faf9f6;border-radius:8px}
.history-empty{text-align:center;padding:40px 20px;color:var(--text-light)}
.history-empty .emoji{font-size:48px;margin-bottom:12px}
</style>
</head>

        const targetIdx = isAfter ? (todayIdx+daysDelta)%7 : (todayIdx-daysDelta+7)%7;
        q = isAfter ? `今天是${weekdays[todayIdx]}，${daysDelta} 天後是星期幾？`
                     : `今天是${weekdays[todayIdx]}，${daysDelta} 天前是星期幾？`;
        a = weekdays[targetIdx];
        opts = [a];
        for (let i=0;i<3;i++){let w=weekdays[Math.floor(Math.random()*7)];while(opts.includes(w))w=weekdays[Math.floor(Math.random()*7)];opts.push(w);}
        opts = s(opts);
      } else if (type === 'month_days') {
        const midx = Math.floor(Math.random()*12);
        const m = midx+1;
        const dim = m===2?28:(months31.includes(m)?31:30);
        q = `${monthNames[midx]}有幾天？`; a=`${dim}天`;
        opts=s(['28天','30天','31天','29天'].filter(o=>o!==a).slice(0,3).concat(a));
      } else if (type === 'months') {
        const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
        const midx=Math.floor(Math.random()*10);
        if (Math.random()<0.5) {
          q=`${months[midx]}的下一個月是幾月？`; a=months[midx+1];
          opts=[months[midx],a,months[(midx+2)%12],months[(midx-1+12)%12]];
        } else {
          q=`${months[midx+1]}的上一個月是幾月？`; a=months[midx];
          opts=[months[midx+1],a,months[(midx+2)%12],months[(midx-1+12)%12]];
        }
        opts=s(opts);
      } else if (type === 'calendar_read') {
        // Show a calendar and ask what day a specific date is
        const m = Math.floor(Math.random()*12)+1;
        const year = 2026;
        const firstDay = new Date(year, m-1, 1).getDay();
        const daysInMonth = m===2?28:(months31.includes(m)?31:30);
        // Pick a date in the middle of the month
        const date = Math.floor(Math.random()*(daysInMonth-4))+3;
        const dateDow = (firstDay+date-1)%7;
        cal = calGrid(year, m);
        q = `看下面的日曆，${m}月${date}日是星期幾？`;
        a = weekdays[dateDow];
        opts = [a];
        for (let i=0;i<3;i++){let w=weekdays[Math.floor(Math.random()*7)];while(opts.includes(w))w=weekdays[Math.floor(Math.random()*7)];opts.push(w);}
        opts = s(opts);
      }
      if (!opts.includes(a)){const idx=Math.floor(Math.random()*4);opts[idx]=a;}
      return {q, a, opts, svg:cal||''};
    }
  },

  'justin-speed-math': {
    name: 'Speed Math 速算練習',
    desc: '20以內加減快速反應',
    icon: '⚡',
    color: '#27ae60',
    type: 'math_gen',
    generator: function() {
      const isAdd = Math.random() < 0.55;
      if (isAdd) {
        const a = Math.floor(Math.random()*18)+1;
        const b = Math.floor(Math.random()*(20-a))+1;
        return {q: `${a} + ${b} = ?`, a: String(a+b)};
      } else {
        const a = Math.floor(Math.random()*19)+2;
        const b = Math.floor(Math.random()*(a-1))+1;
        return {q: `${a} - ${b} = ?`, a: String(a-b)};
      }
    }
  },
};

// ===== LOCAL STORAGE =====
function loadScores() {
  try { return JSON.parse(localStorage.getItem('studybuddy_scores') || '{}'); }
  catch(e) { return {}; }
}
function saveScores(scores) {
  localStorage.setItem('studybuddy_scores', JSON.stringify(scores));
}
function getSubjectScore(subjectId) {
  const scores = loadScores();
  const s = scores[subjectId];
  if (!s) return { total: 0, correct: 0, pct: null, sessions: 0 };
  return { ...s, pct: s.total > 0 ? Math.round(s.correct/s.total*100) : null };
}
function recordSession(subjectId, sessionCorrect, sessionTotal, wrongAnswers) {
  const scores = loadScores();
  if (!scores[subjectId]) scores[subjectId] = { total: 0, correct: 0, sessions: 0 };
  scores[subjectId].total += sessionTotal;
  scores[subjectId].correct += sessionCorrect;
  scores[subjectId].sessions += 1;
  if (!scores[subjectId].history) scores[subjectId].history = [];
  scores[subjectId].history.push({
    date: new Date().toISOString().slice(0,10),
    correct: sessionCorrect,
    total: sessionTotal,
    wrongAnswers: wrongAnswers || []
  });
  if (scores[subjectId].history.length > 20) scores[subjectId].history = scores[subjectId].history.slice(-20);
  saveScores(scores);
}

let selectedOption = null;
function hid(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h).toString(36);}
function exitExercise() {
  if (answered) return; // don't exit while feedback is showing
  if (confirm('確定要退出練習嗎？目前的進度將不會保存。')) {
    goDashboard();
  }
}
function selectOption(opt) {
  selectedOption = opt;
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  const el = document.getElementById('opt-'+hid(opt));
  if (el) el.classList.add('selected');
  document.getElementById('submit-btn').disabled = false;
}

let answered = false;
function submitAnswer() {
  if (answered) return;
  const isChallenge = state.currentSubject === 'challenge';
  const bank = isChallenge ? null : QUESTION_BANKS[state.currentSubject];
  const q = state.currentQuestions[state.currentIndex];
  const qType = isChallenge ? (q._type || 'math_gen') : bank.type;
  let userAnswer = '';

  if (qType === 'choice' || qType === 'reading') {
    userAnswer = selectedOption || '';
  } else {
    userAnswer = document.getElementById('answer-input')?.value.trim() || '';
  }

  if (!userAnswer) return;

  answered = true;
  document.getElementById('submit-btn').disabled = true;

  // Normalize
  const normUser = userAnswer.toLowerCase().replace(/\s+/g,'');
  const normCorrect = q.a.toLowerCase().replace(/\s+/g,'');
  const isCorrect = normUser === normCorrect;

  if (isCorrect) {
    state.score++;
    state.answers.push({ q: q.q, user: userAnswer, correct: q.a, ok: true });
    document.getElementById('feedback').innerHTML = '<span class="correct">✅ 正確！做得好！</span>';
  } else {
    state.answers.push({ q: q.q, user: userAnswer, correct: q.a, ok: false });
    document.getElementById('feedback').innerHTML = `<span class="wrong">❌ 不對啊～ 正確答案是：<b>${q.a}</b></span>`;
  }

  // Auto advance
  setTimeout(() => {
    if (state.currentIndex + 1 < state.currentQuestions.length) {
      state.currentIndex++;
      answered = false;
      selectedOption = null;
      renderExercise();
    } else {
      // Session complete
      finishSession();
    }
  }, state.answers[state.answers.length-1].ok ? 800 : 2000);
}

function finishSession() {
  const total = state.currentQuestions.length;
  const correct = state.score;
  const wrongAnswers = state.answers.filter(a => !a.ok);
  if (state.currentSubject === 'challenge') {
    // For challenge, save as a single session under 'challenge'
    recordSession('challenge', correct, total, wrongAnswers);
  } else {
    recordSession(state.currentSubject, correct, total, wrongAnswers);
  }
  state.screen = 'result';
  render();
}

            <div class="result-stat-label">正確率</div>
          </div>
          <div class="result-stat">

      </div>

        <button class="result-btn secondary" onclick="goDashboard()">📋 返回選單</button>
      </div>

function renderHistory() {
  const p = PROFILES[state.profile];
  const scores = loadScores();

  // Collect all sessions across all subjects for this profile
  let allSessions = [];
  subjects.forEach(sid => {
    const s = scores[sid];
    if (s && s.history) {
      s.history.forEach(h => {
        allSessions.push({
          subjectId: sid,
          subjectName: QUESTION_BANKS[sid].name,
          subjectIcon: QUESTION_BANKS[sid].icon,
          date: h.date,
          correct: h.correct,
          total: h.total,
          pct: Math.round(h.correct/h.total*100),
          wrongAnswers: h.wrongAnswers || [],
        });
      });
    }
  });
  // Also include challenge sessions
  if (scores['challenge'] && scores['challenge'].history) {
    scores['challenge'].history.forEach(h => {
      allSessions.push({
        subjectId: 'challenge',
        subjectName: '綜合挑戰',
        subjectIcon: '🏆',
        date: h.date, correct: h.correct, total: h.total,
        pct: Math.round(h.correct/h.total*100),
        wrongAnswers: h.wrongAnswers || [],
      });

  allSessions.sort((a,b) => b.date.localeCompare(a.date));

  let content = '';
  if (allSessions.length === 0) {
    content = `<div class="history-empty"><div class="emoji">📭</div><p>還沒有學習記錄</p><p style="font-size:13px">完成一次練習後就會出現</p></div>`;
  } else {
    content = `<div class="history-list">` + allSessions.map((sess, idx) => {
      const pctColor = sess.pct>=80?'var(--correct)':sess.pct>=50?'var(--gold)':'var(--wrong)';
      // Show wrong answers if any
      let wrongHtml = '';
      if (sess.wrongAnswers && sess.wrongAnswers.length > 0) {
        wrongHtml = `<div class="history-detail" style="display:none" id="detail-${idx}">
          ${sess.wrongAnswers.map(w => `<div>❌ ${w.q}<br><span style="font-size:11px">你的: <b style="color:var(--wrong)">${w.user}</b> → <b style="color:var(--correct)">${w.correct}</b></span></div>`).join('')}
        </div>`;
      }
      return `
        <div class="history-card" onclick="toggleDetail(${idx})">
          <div class="history-date">${sess.date}</div>
          <div class="history-subject">${sess.subjectIcon} ${sess.subjectName}</div>
          <div class="history-score-row">
            <div class="history-pct" style="color:${pctColor}">${sess.pct}%</div>
            <div class="history-fraction">${sess.correct}/${sess.total} 正確</div>
          </div>
          ${wrongHtml}

          <div class="dash-grade">學習記錄</div>

        <div class="dash-back" onclick="goDashboard()" title="返回">↩️</div>

      <div class="section-title">最近練習 (${allSessions.length} 次)</div>

// Toggle wrong answer detail in history
function toggleDetail(idx) {

function startChallenge() {
  const p = PROFILES[state.profile];
  const subjects = p.subjects;
  
  // Collect all questions from all subjects
  let allQuestions = [];
  subjects.forEach(sid => {
    const bank = QUESTION_BANKS[sid];
    if (bank.generator) {
      // Dynamic: generate 4-5 questions per subject
      const count = Math.min(5, Math.ceil(25/subjects.length));
      for (let i=0; i<count; i++) {
        const q = bank.generator();
        q._subjectId = sid;
        q._type = bank.type;
        allQuestions.push(q);
      }
    } else if (bank.type === 'reading') {
      // Pick 1 passage, take all its questions
      const passage = bank.questions[Math.floor(Math.random()*bank.questions.length)];
      passage.questions.forEach(subq => {
        allQuestions.push({ q:subq.q, a:subq.a, opts:subq.opts, passage:passage.passage, _subjectId:sid, _type:'reading' });
      });
    } else {
      // Static: pick random questions
      const shuffled = [...bank.questions].sort(()=>Math.random()-0.5);
      const picked = shuffled.slice(0, Math.min(4, shuffled.length));
      picked.forEach(q => {
        allQuestions.push({...q, _subjectId:sid, _type:bank.type});
      });
    }
  });
  
  // Shuffle and pick 25
  allQuestions = allQuestions.sort(()=>Math.random()-0.5).slice(0, 25);
  
  state.currentSubject = 'challenge';
  state.currentQuestions = allQuestions;
  state.currentIndex = 0;
  state.score = 0;
  state.answers = [];
  answered = false;
  selectedOption = null;
  state.screen = 'exercise';
  render();
}

function startExercise(subjectId) {
  state.currentSubject = subjectId;
  state.currentIndex = 0;
  state.score = 0;
  state.answers = [];
  answered = false;
  selectedOption = null;

  const bank = QUESTION_BANKS[subjectId];
  let questions;

  if (bank.generator) {
    // Use generator for dynamic questions (math_gen or choice type)
    questions = [];
    for (let i = 0; i < 10; i++) {
      questions.push(bank.generator());
    }
  } else if (bank.type === 'reading') {
    // Pick 2 random passages, extract their sub-questions
    const shuffled = [...bank.questions].sort(() => Math.random() - 0.5);
    questions = [];
    const passages = shuffled.slice(0, Math.min(2, shuffled.length));
    passages.forEach(p => {
      p.questions.forEach(subq => {
        questions.push({ q: subq.q, a: subq.a, opts: subq.opts, passage: p.passage });
      });
    });
  } else {
    // Shuffle and pick 10
    const shuffled = [...bank.questions].sort(() => Math.random() - 0.5);
    questions = shuffled.slice(0, Math.min(10, shuffled.length));
  }

  state.currentQuestions = questions;
  state.screen = 'exercise';
  render();
}

// ===== INIT =====
// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Initial render
render();
</script>
</body>
</html>
